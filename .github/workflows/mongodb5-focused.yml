---
name: MongoDB 5 focused tests

on:
  push:
    branches:
      - ci-mongodb5-focused
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run focused tests
        run: >-
          ./gradlew test
          --tests org.openrewrite.java.spring.data.MigrateSpringDataMongoDb5Test
          --tests org.openrewrite.java.spring.data.UpgradeSpringData_4_0Test
          --stacktrace

  generated-metadata-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Generate recipe metadata
        run: |
          ./gradlew recipeCsvGenerate
          git diff -- src/main/resources/META-INF/rewrite/recipes.csv > recipes.diff
      - name: Run repository build
        shell: bash
        run: |
          set +e
          ./gradlew --console=plain --info --stacktrace --warning-mode=all --no-daemon build > build.log 2>&1
          status=$?
          tail -n 400 build.log
          exit "$status"
      - name: Upload diagnostics and metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mongodb5-generated-metadata-build
          path: |
            build.log
            recipes.diff
            src/main/resources/META-INF/rewrite/recipes.csv
          if-no-files-found: error
