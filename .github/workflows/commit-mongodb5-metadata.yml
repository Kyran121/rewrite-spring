---
name: Commit MongoDB 5 recipe metadata

on:
  push:
    branches:
      - ci-mongodb5-focused
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  commit-metadata:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v7
        with:
          ref: migrate-spring-data-mongodb-5
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Generate recipe metadata
        run: ./gradlew recipeCsvGenerate
      - name: Commit generated metadata
        shell: bash
        run: |
          if git diff --quiet -- src/main/resources/META-INF/rewrite/recipes.csv; then
            echo "No metadata changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/META-INF/rewrite/recipes.csv
          git commit -m "Update recipe metadata for MongoDB migration"
          git push origin HEAD:migrate-spring-data-mongodb-5
