---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.spring.boot4.UpgradeJacksonDependencyManagement
displayName: Preserve Spring Boot Jackson dependency management
description: >-
  Updates Spring Boot's managed Jackson BOM version after the Jackson 2 to 3 migration and removes explicit
  versions from Jackson 3 dependencies managed by Spring Boot.
preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: tools.jackson
      artifactId: jackson-bom
      newVersion: 3.1.x
      overrideManagedVersion: true
  - org.openrewrite.maven.RemoveRedundantDependencyVersions:
      groupPattern: tools.jackson.*
      artifactPattern: "*"
      onlyIfManagedVersionIs: ANY
